<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Сдача денег</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* Базовые стили */
    body { 
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; 
      margin: 0; 
      padding: 16px; 
      box-sizing: border-box; 
      padding-bottom: 20px; 
    }
    
    h2 { margin: 8px 0 16px; }
    
    /* Карточка */
    .card { 
      border: 1px solid rgba(0,0,0,0.05); 
      border-radius: 14px; 
      padding: 14px; 
      margin-bottom: 12px; 
    }

    /* Обычный текст инструкции */
    .instruction-text {
      margin: 0 0 10px 0;
      font-size: 16px;
      line-height: 1.4;
      color: var(--tg-theme-text-color, #000);
    }

    /* Заголовки полей */
    label { 
      display:block; 
      margin: 12px 0 6px; 
      font-size: 14px; 
      color: var(--tg-theme-hint-color, #999); 
      opacity: 0.9; 
    }

    /* === ИСПРАВЛЕНИЕ ПОЛЕЙ ВВОДА === */
    input, select, textarea {
      width: 100%; 
      box-sizing: border-box; 
      padding: 12px; 
      border-radius: 10px;
      
      /* ИЗМЕНЕНИЕ: Делаем рамку серой, чтобы её было видно на черном фоне */
      border: 1px solid rgba(128, 128, 128, 0.4); 
      
      font-size: 16px;
      /* Фон поля берем из темы (черный в темной, белый в светлой) */
      background-color: var(--tg-theme-bg-color, #fff); 
      color: var(--tg-theme-text-color, #000);
      
      /* Плавный переход цвета рамки */
      transition: border-color 0.2s;
    }

    /* Подсветка активного поля (когда на него нажали) */
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--tg-theme-button-color, #2481cc);
      border-width: 2px;
      padding: 11px; /* Компенсация толщины рамки */
    }
    
    /* Подсказки внутри полей */
    input::placeholder, textarea::placeholder {
      color: var(--tg-theme-hint-color, #a8a8a8);
      opacity: 0.3; /* Чуть прибавил, чтобы было видно, но не ярко */
    }

    textarea { min-height: 72px; }
    .row { display:flex; gap:10px; }
    .row > div { flex:1; }
    .error { color: #b00020; margin-top: 10px; font-size: 14px; }
    
    /* Важная подсказка (красная) */
    .hint-warning { 
      color: #d32f2f; 
      font-size: 15px; 
      font-weight: bold; 
      text-align: center; 
      margin: 15px 0; 
      opacity: 0.9;
    }

    /* Стили кнопок */
    button {
      width: 100%; padding: 12px; font-size: 16px;
      border-radius: 12px; border: none; cursor: pointer;
      font-weight: 500;
    }
    
    .btn-primary {
      background-color: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      margin-top: 14px;
    }
    
    .btn-red {
      background-color: #d32f2f; 
      color: #ffffff;            
      font-weight: bold;
      font-size: 17px;
      margin-top: 10px;
    }

    .btn-outline {
      background-color: transparent;
      border: 2px solid var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-text-color, #000);
      margin-bottom: 10px; 
    }
    
    .footer-section {
      margin-top: 20px;
      text-align: center;
    }
    .btn-question {
      background-color: transparent;
      border: 1px solid #e67e22; 
      color: #e67e22;
      font-size: 15px;
      padding: 10px;
    }

    /* Копирайт внизу потока */
    .copyright {
      display: block;
      text-align: center;
      margin-top: 30px; 
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--tg-theme-hint-color, #999);
      text-decoration: none;
      opacity: 0.5;
    }
    .copyright:hover {
      opacity: 1;
      color: var(--tg-theme-button-color, #2481cc);
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- ШАГ 1: ВЫБОР ОПЛАТЫ -->
  <div id="step1">
    <h2>Шаг 1: Оплата</h2>
    
    <div class="card">
      <p class="instruction-text">Сначала выберите вариант оплаты:</p>
      
      <button class="btn-outline" onclick="openPayment('https://messenger.online.sberbank.ru/sl/fphFphF74XMKE2qb9')">
        💳 Сбербанк
      </button>
      
      <button class="btn-outline" onclick="openPayment('https://www.tbank.ru/cf/3J5xZhnK6cY')">
        💳 Т-Банк
      </button>
    </div>

    <h2>Шаг 2: Форма</h2>

    <div class="card">
      <p class="instruction-text">
        После оплаты нажмите кнопку ниже, чтобы заполнить данные о платеже. 👇
      </p>
      
      <button class="btn-red" id="goToFormBtn">
        Я оплатил, заполнить форму 👉
      </button>
    </div>

    <div class="footer-section">
      <button class="btn-question" id="askBtn">
        ❓ У меня вопрос / проблема
      </button>
    </div>
  </div>

  <!-- ШАГ 2: АНКЕТА -->
  <div id="step2" class="hidden">
    <h2>Шаг 2: Анкета</h2>

    <div class="card">
      <div class="row">
        <div>
          <label>Участок *</label>
          <input id="plot" inputmode="numeric" placeholder="Например: 328" />
        </div>
        <div>
          <label>Сбор *</label>
          <select id="collection">
            <option value="">Выбери…</option>
            <option value="2">Сбор 2</option>
            <option value="3">Сбор 3</option>
            <option value="4">Сбор 4</option>
          </select>
        </div>
      </div>

      <label>Сумма (₽) *</label>
      <input id="amount" inputmode="decimal" placeholder="Например: 1000" />

      <label>Банк *</label>
      <input id="bank" placeholder="Сбер / Тинькофф / SBP…" />

      <label>Комментарий (необязательно)</label>
      <textarea id="comment" placeholder="Например: и 329, 330 / перечисли номера / уточнение"></textarea>

      <div class="hint-warning">
        ⚠️ После отправки бот попросит прислать чек (фото/пдф) в этот же чат.
      </div>
      
      <div id="err" class="error"></div>

      <button id="sendBtn" class="btn-primary">Отправить заявку</button>
      
      <button onclick="goBack()" style="background:none; color:#888; font-size:14px; margin-top:5px;">
        ← Вернуться к оплате
      </button>
    </div>
  </div>

  <!-- КОПИРАЙТ -->
  <a href="https://t.me/AI_MAX_AI" class="copyright">Создано @AI_MAX_AI</a>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // === НАСТРОЙКА ЦВЕТОВ ===
    const mainButtonColor = tg.themeParams.button_color || "#2481cc";
    const mainButtonText = tg.themeParams.button_text_color || "#ffffff";
    const textColor = tg.themeParams.text_color || "#000";
    const bgColor = tg.themeParams.bg_color || "#ffffff";
    
    const isDark = tg.colorScheme === 'dark';

    document.body.style.background = bgColor;
    document.body.style.color = textColor;

    // Цвет карточек
    document.querySelectorAll('.card').forEach(c => {
        if (isDark) {
            c.style.backgroundColor = tg.themeParams.secondary_bg_color || "#1c1c1d";
        } else {
            c.style.backgroundColor = "#f4f4f5"; 
        }
    });

    document.querySelectorAll('.btn-primary').forEach(b => {
        b.style.backgroundColor = mainButtonColor;
        b.style.color = mainButtonText;
    });
    document.querySelectorAll('.btn-outline').forEach(b => {
        b.style.borderColor = mainButtonColor;
        b.style.color = textColor;
    });

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const WEBHOOK_URL = 'https://www.maximdkh.ru/webhook/sneg-form'; 

    window.openPayment = (url) => { tg.openLink(url); };

    document.getElementById('goToFormBtn').onclick = () => {
        step1.classList.add('hidden');
        step2.classList.remove('hidden');
        tg.BackButton.show();
        tg.BackButton.onClick(goBack);
    };

    window.goBack = () => {
        step2.classList.add('hidden');
        step1.classList.remove('hidden');
        tg.BackButton.hide();
    };

    document.getElementById('askBtn').onclick = () => {
        const btn = document.getElementById('askBtn');
        btn.disabled = true;
        btn.textContent = "Сообщаю администратору...";

        const payload = { type: "question", user: tg.initDataUnsafe?.user };

        fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => { tg.close(); })
        .catch(() => { alert("Ошибка сети. Напишите просто в чат."); tg.close(); });
    };

    // --- ЛОГИКА ФОРМЫ ---
    const plotEl = document.getElementById("plot");
    const amountEl = document.getElementById("amount");
    const collectionEl = document.getElementById("collection");
    const bankEl = document.getElementById("bank");
    const commentEl = document.getElementById("comment");
    const errEl = document.getElementById("err");
    const sendBtn = document.getElementById("sendBtn");

    function onlyDigits(s) { return String(s).replace(/[^\d]/g, ""); }
    function normAmount(s) { return String(s).replace(",", ".").replace(/[^\d.]/g, ""); }

    sendBtn.onclick = () => {
      errEl.textContent = "";

      const plotRaw = plotEl.value.trim();
      const bankRaw = bankEl.value.trim();
      const collection = collectionEl.value;
      const amountRaw = normAmount(amountEl.value);
      const amount = Number(amountRaw);

      if (plotRaw.includes(',') || plotRaw.includes('.') || plotRaw.includes(' ')) {
         return errEl.textContent = "Укажи только один номер участка (без запятых).";
      }
      
      const plot = onlyDigits(plotRaw);
      
      if (!plot) return errEl.textContent = "Укажи номер участка.";
      if (plot.length > 3) return errEl.textContent = "Номер участка не может быть длиннее 3 цифр.";
      if (!collection) return errEl.textContent = "Выбери номер сбора.";
      if (!amountRaw || !Number.isFinite(amount) || amount <= 0) return errEl.textContent = "Укажи корректную сумму.";
      if (!bankRaw) return errEl.textContent = "Укажи банк оплаты.";

      const payload = {
        type: "payment_form",
        plot: Number(plot),
        collection: Number(collection),
        amount: Math.round(amount * 100) / 100,
        bank: bankRaw, 
        comment: commentEl.value?.trim() || "",
        client_ts: new Date().toISOString(),
        user: tg.initDataUnsafe?.user
      };
      
      sendBtn.disabled = true;
      sendBtn.textContent = "Отправка...";

      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(response => {
        if (response.ok) { tg.close(); } 
        else { 
           errEl.textContent = "Ошибка сервера: " + response.status;
           sendBtn.disabled = false;
           sendBtn.textContent = "Отправить";
        }
      })
      .catch(error => {
        errEl.textContent = "Ошибка сети: " + error.message;
        sendBtn.disabled = false;
        sendBtn.textContent = "Отправить";
      });
    };
  </script>
</body>
</html>
